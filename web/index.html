<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>ソフィBe 口コミ一覧</title>
<style>
  :root {
    --color-bg: #faf9f7;
    --color-surface: #ffffff;
    --color-border: #e8e4e0;
    --color-text: #33302e;
    --color-text-sub: #8a8480;
    --color-accent: #c94f7c;
    --color-accent-soft: #fbeef3;
    --color-star: #e8a13d;
    --shadow-panel: 0 18px 48px rgba(75, 48, 57, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    line-height: 1.7;
    overflow-wrap: anywhere;
  }
  .site-header {
    position: sticky;
    top: 0;
    z-index: 10;
    height: 64px;
    display: flex;
    align-items: center;
    background: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
  }
  .site-header .wrap { padding-top: 0; padding-bottom: 0; }
  h1 { font-size: 20px; margin: 0; }

  /* 上余白はsticky要素（sidebar/summary）自身が持つ。ここに置くとsticky時に間隔が縮む */
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 16px 64px; }

  .layout { display: flex; gap: 32px; align-items: flex-start; }
  .sidebar {
    flex: 0 0 300px;
    position: sticky;
    /* ヘッダー64px + 浮遊ギャップ16px。margin-top と一致させ、
       通常時とsticky時でヘッダーとの間隔を保つ */
    top: 80px;
    margin-top: 16px;
    /* 内容は1画面に収める設計。収まらない環境向けの保険 */
    max-height: calc(100vh - 96px);
    overflow-y: auto;
    padding: 24px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 16px;
    box-shadow: var(--shadow-panel);
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-self: flex-start;
  }
  .results { flex: 1 1 auto; min-width: 0; }
  .summary {
    position: sticky;
    top: 64px;
    z-index: 5;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    background: var(--color-bg);
    color: var(--color-text-sub);
    font-size: 13px;
    margin: 0;
    padding: 16px 0 12px;
    font-variant-numeric: tabular-nums;
  }
  .summary .chip { min-height: 28px; padding: 0 12px; }
  .chip-remove { font-size: 14px; line-height: 1; }

  .filter-group { display: flex; flex-direction: column; gap: 8px; }
  .filter-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-sub);
  }
  .search {
    width: 100%;
    padding: 8px 12px;
    font-size: 15px;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-surface);
    color: var(--color-text);
    transition: border-color .15s;
  }
  .search:focus-visible { outline: none; border-color: var(--color-accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .filter-body {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .filter-toggle {
    display: none;
    min-height: 44px;
    padding: 10px 12px;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 14px;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-surface);
    color: var(--color-text);
    cursor: pointer;
    transition: border-color .15s;
  }
  .filter-toggle:hover { border-color: var(--color-text-sub); }
  .filter-toggle:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; }
  .filter-toggle-meta {
    color: var(--color-text-sub);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .chips-toggle, .summary-clear, .sidebar-clear {
    align-self: flex-start;
    padding: 4px 0;
    border: 0;
    background: transparent;
    color: var(--color-accent);
    font-size: 12px;
    cursor: pointer;
    font-variant-numeric: tabular-nums;
  }
  .sidebar-clear { font-size: 13px; }
  .chips-toggle:hover, .summary-clear:hover, .sidebar-clear:hover { text-decoration: underline; }
  .chips-toggle:focus-visible, .summary-clear:focus-visible, .sidebar-clear:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; border-radius: 4px; }
  .chip-count {
    color: var(--color-text-sub);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .chip-selected .chip-count { color: var(--color-accent); }

  @media (max-width: 980px) {
    /* 1カラムではサイドバーがstickyでないため、上余白はwrapに戻す */
    .wrap { padding-top: 24px; }
    .layout { flex-direction: column; }
    .sidebar {
      position: static;
      flex-basis: auto;
      width: 100%;
      max-height: none;
      overflow-y: visible;
      /* 1カラムではフローティングパネル装飾を外し素の縦積みに戻す */
      margin-top: 0;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      gap: 12px;
    }
    /* フィルター群は「絞り込み」ボタンで開閉（検索は常時表示） */
    .filter-toggle { display: flex; }
    .filter-body:not(.open) { display: none; }
    /* タッチ端末向けにタップ領域を広げる */
    .chip { min-height: 40px; }
    .summary {
      position: static;
      padding-top: 0;
    }
  }

  @media (max-width: 768px) {
    .site-header { height: 56px; }
    .summary { top: 56px; }
  }
  .chip {
    min-height: 32px;
    padding: 4px 12px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    background: var(--color-surface);
    color: var(--color-text);
    cursor: pointer;
    transition: background-color .15s, border-color .15s, color .15s;
    font-variant-numeric: tabular-nums;
  }
  .chip:hover { border-color: var(--color-text-sub); }
  .chip:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; }
  .chip-selected {
    background: var(--color-accent-soft);
    border-color: var(--color-accent);
    color: var(--color-accent);
  }

  .date-head {
    font-size: 13px;
    color: var(--color-text-sub);
    margin: 24px 0 8px;
    font-variant-numeric: tabular-nums;
  }
  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .card-meta {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    font-size: 12px; color: var(--color-text-sub);
    font-variant-numeric: tabular-nums;
  }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--color-accent-soft);
    color: var(--color-accent);
  }
  .stars { color: var(--color-star); letter-spacing: 1px; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--color-border);
    color: var(--color-text-sub);
  }
  .card-title { font-weight: 600; font-size: 14px; margin: 6px 0 0; }
  .card-body { font-size: 14px; margin: 4px 0 0; white-space: pre-wrap; }
  .card-link { font-size: 12px; color: var(--color-accent); text-decoration: none; }
  .card-link:hover { text-decoration: underline; }
  .card-link:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; border-radius: 2px; }

  .empty { color: var(--color-text-sub); text-align: center; padding: 48px 0; }
  .more {
    display: block; width: 100%; margin-top: 16px; padding: 8px;
    font-size: 14px; border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-surface); color: var(--color-text); cursor: pointer;
    transition: background-color .15s;
  }
  .more:hover { background: var(--color-accent-soft); }
  .more:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; }
</style>
</head>
<body>
<header class="site-header">
  <div class="wrap">
    <h1>ソフィBe 口コミ一覧</h1>
  </div>
</header>
<div class="wrap">
  <div class="layout">
    <aside class="sidebar">
      <div class="filter-group">
        <input class="search" id="search" type="search" placeholder="キーワードで絞り込み（例: 記録 消えた）" aria-label="キーワード検索">
      </div>
      <button class="sidebar-clear" id="sidebar-clear-filters" type="button" hidden>絞り込みをクリア</button>
      <button class="filter-toggle" id="filter-toggle" type="button" aria-expanded="false" aria-controls="filter-body">
        <span>絞り込み</span><span class="filter-toggle-meta" id="filter-toggle-meta">未適用</span>
      </button>
      <div class="filter-body" id="filter-body">
        <div class="filter-group">
          <span class="filter-label">ソース</span>
          <div id="source-filter"></div>
        </div>
        <div class="filter-group">
          <span class="filter-label">評価</span>
          <div id="rating-filter"></div>
        </div>
        <div class="filter-group">
          <span class="filter-label">機能</span>
          <div id="feature-filter"></div>
        </div>
        <div class="filter-group">
          <span class="filter-label">バージョン</span>
          <div id="version-filter"></div>
        </div>
      </div>
    </aside>

    <main class="results">
      <div class="summary">
        <span id="summary">読み込み中…</span>
        <span class="chips" id="active-filters"></span>
        <button class="summary-clear" id="clear-filters" type="button" hidden>すべてクリア</button>
      </div>
      <div id="list"></div>
    </main>
  </div>
</div>

<script>
const SOURCE_LABEL = { app_store: "App Store", google_play: "Google Play" };
const PAGE_SIZE = 200;

let items = [];
const FEATURES = ["HOME", "記録", "チャット", "カレンダー", "レポート", "コンテンツ", "設定", "その他"];

let sourceFilter = "all";
let selectedRatings = new Set(); // 空 = 全評価
let selectedVersions = new Set(); // 空 = 全バージョン
let selectedFeatures = new Set(); // 空 = 全機能
let query = "";
let shown = PAGE_SIZE;
let versionExpanded = false; // バージョン群の「すべて表示」状態
const VERSION_LIMIT = 8; // 折りたたみ時に表示する最新バージョン数

// "4.16"(iOS) と "4.16.0"(Android) を同じリリースに束ねる
const verKey = d => {
  const v = (d.version || "").trim();
  if (!v) return "不明";
  return v.split(".").slice(0, 2).join(".");
};

const esc = s => (s || "").replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const stars = r => "★".repeat(r) + "☆".repeat(5 - r);

function filtered() {
  const q = query.trim().toLowerCase();
  const words = q ? q.split(/\s+/) : [];
  return items.filter(d => {
    if (sourceFilter !== "all" && d.source !== sourceFilter) return false;
    if (selectedRatings.size && !selectedRatings.has(d.rating)) return false;
    if (selectedVersions.size && !selectedVersions.has(verKey(d))) return false;
    if (selectedFeatures.size && !(d.features || ["その他"]).some(f => selectedFeatures.has(f))) return false;
    if (words.length) {
      const text = ((d.title || "") + " " + (d.body || "") + " " + (d.author || "")).toLowerCase();
      if (!words.every(w => text.includes(w))) return false;
    }
    return true;
  });
}

function toggleSetValue(set, value) {
  if (set.has(value)) set.delete(value);
  else set.add(value);
}

function renderChipGroup({ mountId, options, selectedValues, onToggle, collapse }) {
  const mount = document.getElementById(mountId);
  mount.innerHTML = "";

  // 折りたたみ時は先頭 limit 件 + 選択中の値のみ表示（選択状態は常に見える）
  const collapsible = collapse && options.length > collapse.limit;
  const visible = collapsible && !collapse.expanded
    ? options.filter((option, i) => i < collapse.limit || selectedValues.includes(option.value))
    : options;

  const chips = document.createElement("div");
  chips.className = "chips";
  for (const option of visible) {
    const selected = selectedValues.includes(option.value);
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "chip" + (selected ? " chip-selected" : "");
    chip.setAttribute("aria-pressed", String(selected));
    chip.innerHTML =
      `<span>${esc(option.label)}</span>` +
      `<span class="chip-count">${option.count}</span>`;
    chip.onclick = () => {
      onToggle(option.value);
      shown = PAGE_SIZE;
      render();
    };
    chips.appendChild(chip);
  }
  mount.appendChild(chips);

  if (collapsible) {
    const toggle = document.createElement("button");
    toggle.type = "button";
    toggle.className = "chips-toggle";
    toggle.setAttribute("aria-expanded", String(collapse.expanded));
    toggle.textContent = collapse.expanded ? "折りたたむ" : `すべて表示（${options.length}）`;
    toggle.onclick = () => {
      collapse.onToggle();
      renderFilters();
    };
    mount.appendChild(toggle);
  }
}

function hasActiveFilter() {
  return sourceFilter !== "all" || selectedRatings.size || selectedVersions.size || selectedFeatures.size;
}

function renderFilters() {
  const counts = {};
  for (const d of items) counts[d.source] = (counts[d.source] || 0) + 1;
  const sourceOptions = ["app_store", "google_play"]
    .filter(key => counts[key])
    .map(key => ({ value: key, label: SOURCE_LABEL[key], count: counts[key] || 0 }));
  renderChipGroup({
    mountId: "source-filter",
    options: sourceOptions,
    selectedValues: sourceFilter === "all" ? [] : [sourceFilter],
    // 単一選択: 選択済みを再度押すと解除（all に戻す）
    onToggle: value => { sourceFilter = sourceFilter === value ? "all" : value; },
  });

  const ratingCounts = {};
  for (const d of items) if (d.rating) ratingCounts[d.rating] = (ratingCounts[d.rating] || 0) + 1;
  renderChipGroup({
    mountId: "rating-filter",
    options: [5, 4, 3, 2, 1].map(r => ({ value: r, label: `星${r}`, count: ratingCounts[r] || 0 })),
    selectedValues: [...selectedRatings],
    onToggle: value => { toggleSetValue(selectedRatings, value); },
  });

  const featCounts = {};
  for (const d of items) for (const f of (d.features || ["その他"])) featCounts[f] = (featCounts[f] || 0) + 1;
  renderChipGroup({
    mountId: "feature-filter",
    options: FEATURES.map(f => ({ value: f, label: f, count: featCounts[f] || 0 })),
    selectedValues: [...selectedFeatures],
    onToggle: value => { toggleSetValue(selectedFeatures, value); },
  });

  const verCounts = {};
  for (const d of items) verCounts[verKey(d)] = (verCounts[verKey(d)] || 0) + 1;
  const versions = Object.keys(verCounts).sort((a, b) => {
    if (a === "不明") return 1;
    if (b === "不明") return -1;
    return b.localeCompare(a, undefined, { numeric: true });
  });
  renderChipGroup({
    mountId: "version-filter",
    options: versions.map(v => ({ value: v, label: v === "不明" ? v : `v${v}`, count: verCounts[v] })),
    selectedValues: [...selectedVersions],
    onToggle: value => { toggleSetValue(selectedVersions, value); },
    collapse: {
      limit: VERSION_LIMIT,
      expanded: versionExpanded,
      onToggle: () => { versionExpanded = !versionExpanded; },
    },
  });

  renderActiveChips(versions);

  const activeCount = (sourceFilter !== "all" ? 1 : 0)
    + selectedRatings.size + selectedFeatures.size + selectedVersions.size;
  document.getElementById("filter-toggle-meta").textContent =
    activeCount ? `${activeCount}件適用中` : "未適用";
  document.getElementById("clear-filters").hidden = !hasActiveFilter();
  document.getElementById("sidebar-clear-filters").hidden = !hasActiveFilter();
}

// 適用中フィルターを結果側サマリー行に削除可能チップで表示
function renderActiveChips(versions) {
  const mount = document.getElementById("active-filters");
  mount.innerHTML = "";
  const active = [];
  if (sourceFilter !== "all") {
    active.push({ label: SOURCE_LABEL[sourceFilter], remove: () => { sourceFilter = "all"; } });
  }
  for (const r of [5, 4, 3, 2, 1].filter(r => selectedRatings.has(r))) {
    active.push({ label: `星${r}`, remove: () => { selectedRatings.delete(r); } });
  }
  for (const f of FEATURES.filter(f => selectedFeatures.has(f))) {
    active.push({ label: f, remove: () => { selectedFeatures.delete(f); } });
  }
  for (const v of versions.filter(v => selectedVersions.has(v))) {
    active.push({ label: v === "不明" ? v : `v${v}`, remove: () => { selectedVersions.delete(v); } });
  }
  for (const item of active) {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "chip chip-selected";
    chip.setAttribute("aria-label", `${item.label} の絞り込みを解除`);
    chip.innerHTML = `${esc(item.label)} <span class="chip-remove">×</span>`;
    chip.onclick = () => {
      item.remove();
      shown = PAGE_SIZE;
      render();
    };
    mount.appendChild(chip);
  }
}

function render() {
  renderFilters();
  const data = filtered();
  const latest = items[0] ? items[0].created_at.slice(0, 10) : "-";
  document.getElementById("summary").textContent =
    `全 ${items.length} 件中 ${data.length} 件を表示 ・ 最新の口コミ日: ${latest}`;

  const list = document.getElementById("list");
  list.innerHTML = "";
  if (!data.length) {
    list.innerHTML = '<p class="empty">条件に合う口コミがありません</p>';
    return;
  }
  let currentDate = null;
  for (const d of data.slice(0, shown)) {
    const date = d.created_at ? d.created_at.slice(0, 10) : "日付不明";
    if (date !== currentDate) {
      currentDate = date;
      const h = document.createElement("div");
      h.className = "date-head";
      h.textContent = date;
      list.appendChild(h);
    }
    const meta = [
      `<span class="badge">${esc(SOURCE_LABEL[d.source] || d.source)}</span>`,
      d.rating ? `<span class="stars" aria-label="評価 ${d.rating}">${stars(d.rating)}</span>` : "",
      d.version ? `<span>v${esc(d.version)}</span>` : "",
      d.author ? `<span>${esc(d.author)}</span>` : "",
      ...(d.features || []).map(f => `<span class="tag">${esc(f)}</span>`),
      `<a class="card-link" href="${esc(d.url)}" target="_blank" rel="noopener">開く</a>`,
    ].filter(Boolean).join("");
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      `<div class="card-meta">${meta}</div>` +
      (d.title ? `<div class="card-title">${esc(d.title)}</div>` : "") +
      (d.body ? `<div class="card-body">${esc(d.body)}</div>` : "");
    list.appendChild(card);
  }
  if (data.length > shown) {
    const b = document.createElement("button");
    b.className = "more";
    b.textContent = `さらに表示（残り ${data.length - shown} 件）`;
    b.onclick = () => { shown += PAGE_SIZE; render(); };
    list.appendChild(b);
  }
}

document.getElementById("search").addEventListener("input", e => {
  query = e.target.value;
  shown = PAGE_SIZE;
  render();
});

function clearAllFilters() {
  sourceFilter = "all";
  selectedRatings.clear();
  selectedFeatures.clear();
  selectedVersions.clear();
  shown = PAGE_SIZE;
  render();
}
document.getElementById("clear-filters").addEventListener("click", clearAllFilters);
document.getElementById("sidebar-clear-filters").addEventListener("click", clearAllFilters);

document.getElementById("filter-toggle").addEventListener("click", function () {
  const body = document.getElementById("filter-body");
  const open = body.classList.toggle("open");
  this.setAttribute("aria-expanded", String(open));
});

fetch("./items.json", { cache: "no-cache" })
  .then(r => r.json())
  .then(data => { items = data; render(); })
  .catch(() => {
    document.getElementById("summary").textContent = "データの読み込みに失敗しました";
  });
</script>
</body>
</html>
