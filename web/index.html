<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>ソフィBe 口コミ一覧</title>
<style>
  :root {
    --color-bg: #faf9f7;
    --color-surface: #ffffff;
    --color-border: #e8e4e0;
    --color-text: #33302e;
    --color-text-sub: #8a8480;
    --color-accent: #c94f7c;
    --color-accent-soft: #fbeef3;
    --color-star: #e8a13d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    line-height: 1.7;
    overflow-wrap: anywhere;
  }
  .site-header {
    position: sticky;
    top: 0;
    z-index: 10;
    height: 64px;
    display: flex;
    align-items: center;
    background: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
  }
  .site-header .wrap { padding-top: 0; padding-bottom: 0; }
  h1 { font-size: 20px; margin: 0; }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 16px 64px; }

  .layout { display: flex; gap: 32px; align-items: flex-start; }
  .sidebar {
    flex: 0 0 260px;
    position: sticky;
    top: 64px;
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    padding: 24px 4px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .results { flex: 1 1 auto; min-width: 0; }
  .summary {
    position: sticky;
    top: 64px;
    z-index: 5;
    background: var(--color-bg);
    color: var(--color-text-sub);
    font-size: 13px;
    margin: 0;
    padding: 16px 0 12px;
    font-variant-numeric: tabular-nums;
  }

  .filter-group { display: flex; flex-direction: column; gap: 8px; }
  .filter-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-sub);
  }
  .search {
    width: 100%;
    padding: 8px 12px;
    font-size: 15px;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-surface);
    color: var(--color-text);
    transition: border-color .15s;
  }
  .search:focus-visible { outline: none; border-color: var(--color-accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .filter-shell { display: flex; flex-direction: column; gap: 8px; }
  .filter-popover { position: relative; }
  .filter-trigger {
    width: 100%;
    min-height: 44px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 14px;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-surface);
    color: var(--color-text);
    cursor: pointer;
    transition: border-color .15s, background-color .15s;
  }
  .filter-trigger:hover { border-color: var(--color-text-sub); }
  .filter-trigger:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; }
  .filter-trigger.has-value {
    border-color: var(--color-accent);
    background: var(--color-accent-soft);
  }
  .filter-trigger-label {
    min-width: 0;
    text-align: left;
  }
  .filter-trigger-meta {
    flex-shrink: 0;
    color: var(--color-text-sub);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .filter-panel {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 0;
    z-index: 20;
    padding: 8px;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-surface);
    box-shadow: 0 12px 24px rgba(51, 48, 46, 0.08);
  }
  .filter-actions {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  .filter-clear {
    padding: 0;
    border: 0;
    background: transparent;
    color: var(--color-accent);
    font-size: 12px;
    cursor: pointer;
  }
  .filter-clear:hover { text-decoration: underline; }
  .filter-clear:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; border-radius: 4px; }
  .filter-options {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 240px;
    overflow-y: auto;
  }
  .filter-option {
    width: 100%;
    min-height: 40px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border: 0;
    border-radius: 8px;
    background: transparent;
    color: var(--color-text);
    font-size: 14px;
    cursor: pointer;
    transition: background-color .15s, color .15s;
  }
  .filter-option:hover { background: var(--color-accent-soft); }
  .filter-option:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; }
  .filter-option.is-selected {
    background: var(--color-accent-soft);
    color: var(--color-accent);
  }
  .filter-option-count {
    flex-shrink: 0;
    color: var(--color-text-sub);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .selected-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  @media (max-width: 768px) {
    .site-header { height: 56px; }
    .summary { top: 56px; }
    .layout { flex-direction: column; }
    .sidebar {
      position: static;
      top: auto;
      flex-basis: auto;
      width: 100%;
      max-height: none;
      overflow-y: visible;
      padding: 0;
    }
    .filter-panel {
      position: static;
      margin-top: 8px;
      box-shadow: none;
    }
  }
  .chip {
    min-height: 36px;
    padding: 6px 12px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    background: var(--color-surface);
    color: var(--color-text);
    cursor: pointer;
    transition: background-color .15s, border-color .15s, color .15s;
    font-variant-numeric: tabular-nums;
  }
  .chip:hover { border-color: var(--color-text-sub); }
  .chip:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; }
  .chip-selected {
    background: var(--color-accent-soft);
    border-color: var(--color-accent);
    color: var(--color-accent);
  }
  .chip-remove { font-size: 14px; line-height: 1; }

  .date-head {
    font-size: 13px;
    color: var(--color-text-sub);
    margin: 24px 0 8px;
    font-variant-numeric: tabular-nums;
  }
  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .card-meta {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    font-size: 12px; color: var(--color-text-sub);
    font-variant-numeric: tabular-nums;
  }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--color-accent-soft);
    color: var(--color-accent);
  }
  .stars { color: var(--color-star); letter-spacing: 1px; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--color-border);
    color: var(--color-text-sub);
  }
  .card-title { font-weight: 600; font-size: 14px; margin: 6px 0 0; }
  .card-body { font-size: 14px; margin: 4px 0 0; white-space: pre-wrap; }
  .card-link { font-size: 12px; color: var(--color-accent); text-decoration: none; }
  .card-link:hover { text-decoration: underline; }
  .card-link:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; border-radius: 2px; }

  .empty { color: var(--color-text-sub); text-align: center; padding: 48px 0; }
  .more {
    display: block; width: 100%; margin-top: 16px; padding: 8px;
    font-size: 14px; border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-surface); color: var(--color-text); cursor: pointer;
    transition: background-color .15s;
  }
  .more:hover { background: var(--color-accent-soft); }
  .more:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; }
</style>
</head>
<body>
<header class="site-header">
  <div class="wrap">
    <h1>ソフィBe 口コミ一覧</h1>
  </div>
</header>
<div class="wrap">
  <div class="layout">
    <aside class="sidebar">
      <div class="filter-group">
        <input class="search" id="search" type="search" placeholder="キーワードで絞り込み（例: 記録 消えた）" aria-label="キーワード検索">
      </div>
      <div class="filter-group">
        <span class="filter-label">ソース</span>
        <div id="source-filter"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">評価</span>
        <div id="rating-filter"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">機能</span>
        <div id="feature-filter"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">バージョン</span>
        <div id="version-filter"></div>
      </div>
    </aside>

    <main class="results">
      <p class="summary" id="summary">読み込み中…</p>
      <div id="list"></div>
    </main>
  </div>
</div>

<script>
const SOURCE_LABEL = { app_store: "App Store", google_play: "Google Play", x: "X" };
const PAGE_SIZE = 200;

let items = [];
const FEATURES = ["HOME", "記録", "チャット", "カレンダー", "レポート", "コンテンツ", "設定", "その他"];

let sourceFilter = "all";
let selectedRatings = new Set(); // 空 = 全評価
let selectedVersions = new Set(); // 空 = 全バージョン
let selectedFeatures = new Set(); // 空 = 全機能
let query = "";
let shown = PAGE_SIZE;
let openDropdown = null;

// "4.16"(iOS) と "4.16.0"(Android) を同じリリースに束ねる
const verKey = d => {
  const v = (d.version || "").trim();
  if (!v) return "不明";
  return v.split(".").slice(0, 2).join(".");
};

const esc = s => (s || "").replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const stars = r => "★".repeat(r) + "☆".repeat(5 - r);

function filtered() {
  const q = query.trim().toLowerCase();
  const words = q ? q.split(/\s+/) : [];
  return items.filter(d => {
    if (sourceFilter !== "all" && d.source !== sourceFilter) return false;
    if (selectedRatings.size && !selectedRatings.has(d.rating)) return false;
    if (selectedVersions.size && !selectedVersions.has(verKey(d))) return false;
    if (selectedFeatures.size && !(d.features || ["その他"]).some(f => selectedFeatures.has(f))) return false;
    if (words.length) {
      const text = ((d.title || "") + " " + (d.body || "") + " " + (d.author || "")).toLowerCase();
      if (!words.every(w => text.includes(w))) return false;
    }
    return true;
  });
}

function toggleSetValue(set, value) {
  if (set.has(value)) set.delete(value);
  else set.add(value);
}

function renderDropdown({
  mountId,
  dropdownId,
  buttonLabel,
  buttonMeta,
  options,
  selectedValues,
  multi = true,
  onSelect,
  onRemove,
  onClear,
  clearLabel,
}) {
  const mount = document.getElementById(mountId);
  mount.innerHTML = "";

  const wrap = document.createElement("div");
  wrap.className = "filter-shell";

  const popover = document.createElement("div");
  popover.className = "filter-popover";
  popover.dataset.dropdownId = dropdownId;

  const trigger = document.createElement("button");
  trigger.type = "button";
  trigger.className = "filter-trigger" + (selectedValues.length ? " has-value" : "");
  trigger.setAttribute("aria-expanded", String(openDropdown === dropdownId));
  trigger.setAttribute("aria-controls", `${dropdownId}-panel`);
  trigger.innerHTML =
    `<span class="filter-trigger-label">${esc(buttonLabel)}</span>` +
    `<span class="filter-trigger-meta">${esc(buttonMeta)}</span>`;
  trigger.onclick = event => {
    event.stopPropagation();
    openDropdown = openDropdown === dropdownId ? null : dropdownId;
    renderFilters();
  };
  popover.appendChild(trigger);

  const panel = document.createElement("div");
  panel.id = `${dropdownId}-panel`;
  panel.className = "filter-panel";
  panel.hidden = openDropdown !== dropdownId;
  panel.addEventListener("click", event => event.stopPropagation());

  if (selectedValues.length) {
    const actions = document.createElement("div");
    actions.className = "filter-actions";
    const clear = document.createElement("button");
    clear.type = "button";
    clear.className = "filter-clear";
    clear.textContent = clearLabel;
    clear.onclick = () => {
      onClear();
      shown = PAGE_SIZE;
      render();
    };
    actions.appendChild(clear);
    panel.appendChild(actions);
  }

  const optionsWrap = document.createElement("div");
  optionsWrap.className = "filter-options";
  for (const option of options) {
    const selected = selectedValues.includes(option.value);
    const button = document.createElement("button");
    button.type = "button";
    button.className = "filter-option" + (selected ? " is-selected" : "");
    button.innerHTML =
      `<span>${esc(option.label)}</span>` +
      `<span class="filter-option-count">${option.count}</span>`;
    button.onclick = () => {
      onSelect(option.value);
      shown = PAGE_SIZE;
      if (!multi) openDropdown = null;
      render();
    };
    optionsWrap.appendChild(button);
  }
  panel.appendChild(optionsWrap);
  popover.appendChild(panel);
  wrap.appendChild(popover);

  if (selectedValues.length) {
    const chips = document.createElement("div");
    chips.className = "selected-chips";
    for (const option of options.filter(option => selectedValues.includes(option.value))) {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "chip chip-selected";
      chip.setAttribute("aria-label", `${option.label} を解除`);
      chip.innerHTML = `${esc(option.label)} <span class="chip-remove">×</span>`;
      chip.onclick = () => {
        onRemove(option.value);
        shown = PAGE_SIZE;
        render();
      };
      chips.appendChild(chip);
    }
    wrap.appendChild(chips);
  }

  mount.appendChild(wrap);
}

function renderFilters() {
  const counts = { all: items.length };
  for (const d of items) counts[d.source] = (counts[d.source] || 0) + 1;
  const sourceOptions = ["app_store", "google_play", "x"]
    .filter(key => counts[key])
    .map(key => ({ value: key, label: SOURCE_LABEL[key], count: counts[key] || 0 }));
  renderDropdown({
    mountId: "source-filter",
    dropdownId: "source",
    buttonLabel: sourceFilter === "all" ? "すべてのソース" : SOURCE_LABEL[sourceFilter],
    buttonMeta: sourceFilter === "all" ? `${items.length} 件` : "1件選択中",
    options: sourceOptions,
    selectedValues: sourceFilter === "all" ? [] : [sourceFilter],
    multi: false,
    onSelect: value => { sourceFilter = value; },
    onRemove: () => { sourceFilter = "all"; },
    onClear: () => { sourceFilter = "all"; },
    clearLabel: "すべてに戻す",
  });
  const ratingCounts = {};
  for (const d of items) if (d.rating) ratingCounts[d.rating] = (ratingCounts[d.rating] || 0) + 1;
  renderDropdown({
    mountId: "rating-filter",
    dropdownId: "rating",
    buttonLabel: selectedRatings.size ? "評価を選択" : "すべての評価",
    buttonMeta: selectedRatings.size ? `${selectedRatings.size}件選択中` : "未選択",
    options: [5, 4, 3, 2, 1].map(r => ({ value: r, label: `星${r}`, count: ratingCounts[r] || 0 })),
    selectedValues: [...selectedRatings],
    onSelect: value => { toggleSetValue(selectedRatings, value); },
    onRemove: value => { selectedRatings.delete(value); },
    onClear: () => { selectedRatings.clear(); },
    clearLabel: "評価をクリア",
  });

  const featCounts = {};
  for (const d of items) for (const f of (d.features || ["その他"])) featCounts[f] = (featCounts[f] || 0) + 1;
  renderDropdown({
    mountId: "feature-filter",
    dropdownId: "feature",
    buttonLabel: selectedFeatures.size ? "機能を選択" : "すべての機能",
    buttonMeta: selectedFeatures.size ? `${selectedFeatures.size}件選択中` : "未選択",
    options: FEATURES.map(f => ({ value: f, label: f, count: featCounts[f] || 0 })),
    selectedValues: [...selectedFeatures],
    onSelect: value => { toggleSetValue(selectedFeatures, value); },
    onRemove: value => { selectedFeatures.delete(value); },
    onClear: () => { selectedFeatures.clear(); },
    clearLabel: "機能をクリア",
  });

  const verCounts = {};
  for (const d of items) verCounts[verKey(d)] = (verCounts[verKey(d)] || 0) + 1;
  const versions = Object.keys(verCounts).sort((a, b) => {
    if (a === "不明") return 1;
    if (b === "不明") return -1;
    return b.localeCompare(a, undefined, { numeric: true });
  });
  renderDropdown({
    mountId: "version-filter",
    dropdownId: "version",
    buttonLabel: selectedVersions.size ? "バージョンを選択" : "すべてのバージョン",
    buttonMeta: selectedVersions.size ? `${selectedVersions.size}件選択中` : "未選択",
    options: versions.map(v => ({ value: v, label: v === "不明" ? v : `v${v}`, count: verCounts[v] })),
    selectedValues: [...selectedVersions],
    onSelect: value => { toggleSetValue(selectedVersions, value); },
    onRemove: value => { selectedVersions.delete(value); },
    onClear: () => { selectedVersions.clear(); },
    clearLabel: "バージョンをクリア",
  });
}

function render() {
  renderFilters();
  const data = filtered();
  const latest = items[0] ? items[0].created_at.slice(0, 10) : "-";
  document.getElementById("summary").textContent =
    `全 ${items.length} 件中 ${data.length} 件を表示 ・ 最新の口コミ日: ${latest}`;

  const list = document.getElementById("list");
  list.innerHTML = "";
  if (!data.length) {
    list.innerHTML = '<p class="empty">条件に合う口コミがありません</p>';
    return;
  }
  let currentDate = null;
  for (const d of data.slice(0, shown)) {
    const date = d.created_at ? d.created_at.slice(0, 10) : "日付不明";
    if (date !== currentDate) {
      currentDate = date;
      const h = document.createElement("div");
      h.className = "date-head";
      h.textContent = date;
      list.appendChild(h);
    }
    const meta = [
      `<span class="badge">${esc(SOURCE_LABEL[d.source] || d.source)}</span>`,
      d.rating ? `<span class="stars" aria-label="評価 ${d.rating}">${stars(d.rating)}</span>` : "",
      d.version ? `<span>v${esc(d.version)}</span>` : "",
      d.author ? `<span>${esc(d.author)}</span>` : "",
      ...(d.features || []).map(f => `<span class="tag">${esc(f)}</span>`),
      `<a class="card-link" href="${esc(d.url)}" target="_blank" rel="noopener">開く</a>`,
    ].filter(Boolean).join("");
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      `<div class="card-meta">${meta}</div>` +
      (d.title ? `<div class="card-title">${esc(d.title)}</div>` : "") +
      (d.body ? `<div class="card-body">${esc(d.body)}</div>` : "");
    list.appendChild(card);
  }
  if (data.length > shown) {
    const b = document.createElement("button");
    b.className = "more";
    b.textContent = `さらに表示（残り ${data.length - shown} 件）`;
    b.onclick = () => { shown += PAGE_SIZE; render(); };
    list.appendChild(b);
  }
}

document.getElementById("search").addEventListener("input", e => {
  query = e.target.value;
  shown = PAGE_SIZE;
  render();
});

document.addEventListener("click", event => {
  if (!event.target.closest(".filter-popover") && openDropdown !== null) {
    openDropdown = null;
    renderFilters();
  }
});

document.addEventListener("keydown", event => {
  if (event.key === "Escape" && openDropdown !== null) {
    openDropdown = null;
    renderFilters();
  }
});

fetch("./items.json", { cache: "no-cache" })
  .then(r => r.json())
  .then(data => { items = data; render(); })
  .catch(() => {
    document.getElementById("summary").textContent = "データの読み込みに失敗しました";
  });
</script>
</body>
</html>
