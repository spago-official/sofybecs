name: collect-reviews

on:
  schedule:
    # JST 6:00 / 12:00 / 18:00 / 24:00（UTC+9）
    - cron: "0 21,3,9,15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect-reviews
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect and notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m collector.main

      - name: Persist state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          git diff --cached --quiet || git commit -m "chore: update seen state [skip ci]"
          git push
